<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>Fee Statement Portal · 3rd Term 2025–2026</title>
<meta name="description" content="Private fee statement lookup for parents.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#152238;
    --ink-soft:#4b5768;
    --paper:#e9edf4;
    --surface:#ffffff;
    --surface-sunk:#f4f6fa;
    --hairline:#dbe1ec;
    --brass:#b8892f;
    --brass-rgb:184,137,47;
    --brass-soft:#f3e6cd;
    --green:#1f7a4d;
    --green-soft:#e2f3e9;
    --red:#b3392c;
    --red-soft:#fbe9e6;
    --radius-lg:20px;
    --radius-md:14px;
    --radius-sm:9px;
    --shadow-card:0 24px 60px -20px rgba(21,34,56,0.35), 0 2px 8px rgba(21,34,56,0.06);
    --font-display:'Fraunces', Georgia, serif;
    --font-body:'IBM Plex Sans', -apple-system, BlinkMacSystemFont, Arial, sans-serif;
    --font-mono:'IBM Plex Mono', 'SFMono-Regular', Menlo, monospace;
  }

  @media (prefers-color-scheme: dark){
    :root{
      --ink:#eef1f6;
      --ink-soft:#a7b0c0;
      --paper:#0d1420;
      --surface:#141d2c;
      --surface-sunk:#101828;
      --hairline:#26324a;
      --brass:#dbb063;
      --brass-rgb:219,176,99;
      --brass-soft:#2c2410;
      --green:#5fd39a;
      --green-soft:#122a20;
      --red:#f0897c;
      --red-soft:#2c1512;
      --shadow-card:0 24px 60px -20px rgba(0,0,0,0.6), 0 2px 8px rgba(0,0,0,0.3);
    }
  }

  *{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  html{ -webkit-text-size-adjust:100%; }

  body{
    font-family:var(--font-body);
    background:
      radial-gradient(1200px 600px at 15% -10%, rgba(var(--brass-rgb),0.12), transparent 60%),
      var(--paper);
    color:var(--ink);
    min-height:100vh;
    min-height:100dvh;
    padding:28px 14px;
    display:flex;
    justify-content:center;
    -webkit-font-smoothing:antialiased;
  }

  @media (max-width:480px){ body{ padding:0; align-items:stretch; } }

  .sheet{
    max-width:480px;
    width:100%;
    height:fit-content;
    background:var(--surface);
    border-radius:var(--radius-lg);
    box-shadow:var(--shadow-card);
    overflow:hidden;
    animation:rise .5s cubic-bezier(.2,.8,.2,1);
  }

  @media (max-width:480px){ .sheet{ border-radius:0; min-height:100dvh; box-shadow:none; } }

  @keyframes rise{ from{ opacity:0; transform:translateY(18px); } to{ opacity:1; transform:none; } }
  @media (prefers-reduced-motion:reduce){ .sheet{ animation:none; } }

  /* ---- Header band ---- */
  header{
    background:linear-gradient(160deg, var(--ink) 0%, #223458 100%);
    color:#f2f4f8;
    padding:30px 26px 26px;
    position:relative;
  }

  .crest{
    width:44px; height:44px;
    border-radius:50%;
    border:1.5px solid rgba(255,255,255,0.35);
    display:flex; align-items:center; justify-content:center;
    font-family:var(--font-display);
    font-weight:600; font-size:1.15em;
    color:#f2f4f8;
    margin-bottom:14px;
    background:rgba(255,255,255,0.06);
  }

  header h1{
    font-family:var(--font-display);
    font-weight:600;
    font-size:1.5em;
    letter-spacing:-0.01em;
    line-height:1.15;
  }

  header p{
    margin-top:6px;
    font-size:0.85em;
    color:rgba(242,244,248,0.65);
    letter-spacing:0.02em;
  }

  /* torn / perforated divider */
  .perforation{
    position:relative;
    height:14px;
    background:var(--surface);
  }
  .perforation::before{
    content:'';
    position:absolute;
    top:-7px; left:0; right:0; height:14px;
    background:radial-gradient(circle at 50% 50%, var(--paper) 0, var(--paper) 5.5px, transparent 6px);
    background-size:20px 14px;
    background-repeat:repeat-x;
    background-position:8px 0;
  }
  @media (max-width:480px){
    .perforation::before{ background-image:radial-gradient(circle at 50% 50%, var(--paper) 0, var(--paper) 5.5px, transparent 6px); }
  }

  /* ---- Code entry ---- */
  .form-section{ padding:24px 26px 22px; }

  .form-label{
    font-size:0.72em;
    font-weight:600;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:var(--ink-soft);
    display:block;
    margin-bottom:10px;
  }

  .input-row{ display:flex; gap:8px; }

  input#codeInput{
    flex:1;
    min-width:0;
    padding:14px 14px;
    font-size:1.05em;
    font-family:var(--font-mono);
    letter-spacing:0.14em;
    font-weight:500;
    color:var(--ink);
    background:var(--surface-sunk);
    border:1.5px solid var(--hairline);
    border-radius:var(--radius-sm);
    outline:none;
    text-transform:uppercase;
    transition:border-color .2s ease, box-shadow .2s ease;
  }
  input#codeInput::placeholder{ color:var(--ink-soft); opacity:0.55; letter-spacing:0.05em; font-weight:400; }
  input#codeInput:focus{ border-color:var(--brass); box-shadow:0 0 0 4px rgba(var(--brass-rgb),0.18); }
  input#codeInput:disabled{ opacity:0.55; }

  button#checkBtn{
    flex:0 0 auto;
    padding:0 20px;
    font-size:0.95em;
    font-family:var(--font-body);
    font-weight:600;
    color:#fff;
    background:var(--ink);
    border:none;
    border-radius:var(--radius-sm);
    cursor:pointer;
    display:flex; align-items:center; gap:7px;
    transition:transform .15s ease, opacity .15s ease;
  }
  button#checkBtn:active{ transform:scale(0.96); }
  button#checkBtn:disabled{ opacity:0.55; cursor:not-allowed; }
  button#checkBtn svg{ width:16px; height:16px; }

  .help-text{
    margin-top:12px;
    font-size:0.8em;
    color:var(--ink-soft);
    line-height:1.5;
  }

  :focus-visible{ outline:2px solid var(--brass); outline-offset:2px; }

  /* ---- Result area ---- */
  .result-section{ padding:4px 26px 26px; min-height:180px; }

  .placeholder{
    text-align:center;
    padding:34px 12px 10px;
    color:var(--ink-soft);
  }
  .placeholder svg{ width:34px; height:34px; margin-bottom:10px; opacity:0.5; }
  .placeholder p{ font-size:0.92em; }

  .loading{ text-align:center; padding:44px 12px; color:var(--ink-soft); }
  .spinner{
    width:30px; height:30px;
    border:3px solid var(--hairline);
    border-top:3px solid var(--brass);
    border-radius:50%;
    margin:0 auto 14px;
    animation:spin .7s linear infinite;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  .error{
    background:var(--red-soft);
    border-left:3px solid var(--red);
    padding:16px 16px;
    border-radius:var(--radius-sm);
    color:var(--red);
    display:flex;
    gap:12px;
    align-items:flex-start;
    font-size:0.92em;
    line-height:1.45;
  }
  .error svg{ width:18px; height:18px; flex:0 0 auto; margin-top:1px; }

  /* ---- Statement card ---- */
  .statement{ animation:rise .35s cubic-bezier(.2,.8,.2,1); }

  .student-row{
    display:flex; justify-content:space-between; align-items:flex-start;
    gap:12px; margin-bottom:18px;
  }
  .student-name{ font-family:var(--font-display); font-size:1.18em; font-weight:600; line-height:1.25; }
  .student-code{ font-family:var(--font-mono); font-size:0.76em; color:var(--ink-soft); margin-top:4px; letter-spacing:0.03em; }
  .class-badge{
    flex:0 0 auto;
    background:var(--surface-sunk);
    border:1px solid var(--hairline);
    color:var(--ink-soft);
    padding:5px 11px;
    border-radius:100px;
    font-size:0.72em;
    font-weight:600;
    letter-spacing:0.03em;
    white-space:nowrap;
  }

  /* progress ring + totals */
  .progress-block{
    display:flex; align-items:center; gap:18px;
    background:var(--surface-sunk);
    border:1px solid var(--hairline);
    border-radius:var(--radius-md);
    padding:16px 16px;
    margin-bottom:18px;
  }
  .ring-wrap{ position:relative; flex:0 0 auto; width:76px; height:76px; }
  .ring-wrap svg{ transform:rotate(-90deg); }
  .ring-track{ fill:none; stroke:var(--hairline); stroke-width:7; }
  .ring-fill{ fill:none; stroke:var(--brass); stroke-width:7; stroke-linecap:round; transition:stroke-dashoffset .8s cubic-bezier(.2,.8,.2,1); }
  .ring-fill.paid-full{ stroke:var(--green); }
  .ring-pct{
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    font-family:var(--font-mono); font-weight:600; font-size:0.86em;
  }

  .totals{ flex:1; min-width:0; }
  .totals-row{ display:flex; justify-content:space-between; font-size:0.86em; padding:3px 0; }
  .totals-row .t-label{ color:var(--ink-soft); }
  .totals-row .t-val{ font-family:var(--font-mono); font-weight:500; }
  .totals-row.balance .t-label{ color:var(--ink); font-weight:600; }
  .totals-row.balance .t-val{ font-weight:700; font-size:1.02em; }
  .totals-row.balance .t-val.due{ color:var(--red); }
  .totals-row.balance .t-val.clear{ color:var(--green); }

  .status-pill{
    display:inline-flex; align-items:center; gap:5px;
    font-size:0.72em; font-weight:600; letter-spacing:0.02em;
    padding:4px 10px; border-radius:100px; margin-top:6px;
  }
  .status-pill.due{ background:var(--red-soft); color:var(--red); }
  .status-pill.clear{ background:var(--green-soft); color:var(--green); }
  .status-pill svg{ width:11px; height:11px; }

  /* ledger breakdown */
  .ledger-title{
    font-size:0.72em; font-weight:600; letter-spacing:0.1em; text-transform:uppercase;
    color:var(--ink-soft); margin-bottom:10px;
  }
  .ledger{ margin-bottom:20px; }
  .ledger-row{
    display:flex; align-items:baseline; gap:8px;
    padding:7px 0;
    border-bottom:1px dotted var(--hairline);
    font-size:0.9em;
  }
  .ledger-row:last-child{ border-bottom:none; }
  .ledger-cat{ color:var(--ink-soft); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .ledger-leader{ flex:1; border-bottom:1px dotted var(--hairline); min-width:8px; transform:translateY(-3px); }
  .ledger-amt{ font-family:var(--font-mono); font-weight:500; white-space:nowrap; }

  .no-details{ font-size:0.86em; color:var(--ink-soft); padding:8px 0 4px; }

  /* actions */
  .actions{ display:flex; gap:8px; }
  .action-btn{
    flex:1;
    display:flex; align-items:center; justify-content:center; gap:7px;
    padding:11px 12px;
    font-family:var(--font-body); font-size:0.85em; font-weight:600;
    border-radius:var(--radius-sm);
    border:1px solid var(--hairline);
    background:var(--surface);
    color:var(--ink);
    cursor:pointer;
    transition:background .15s ease, transform .15s ease;
  }
  .action-btn:active{ transform:scale(0.97); }
  .action-btn svg{ width:15px; height:15px; }
  .action-btn.primary{ background:var(--ink); color:#fff; border-color:var(--ink); }

  footer{
    padding:16px 26px 22px;
    border-top:1px solid var(--hairline);
    text-align:center;
  }
  footer p{ font-size:0.78em; color:var(--ink-soft); }
  footer p + p{ margin-top:2px; }
</style>
</head>
<body>
  <main class="sheet" id="app">
    <header>
      <div class="crest">FP</div>
      <h1>Fee Statement Portal</h1>
      <p>3rd Term · 2025–2026 Session</p>
    </header>

    <div class="perforation"></div>

    <div class="form-section">
      <label class="form-label" for="codeInput">Family code</label>
      <div class="input-row">
        <input
          type="text"
          id="codeInput"
          placeholder="e.g. ABAABD1000"
          maxlength="20"
          autofocus
          inputmode="text"
          autocorrect="off"
          autocapitalize="characters"
          spellcheck="false"
          aria-label="Family code"
        >
        <button id="checkBtn" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
          <span>Check</span>
        </button>
      </div>
      <p class="help-text">Don't have a code? Contact the school office — codes aren't shared over text for privacy.</p>
    </div>

    <div class="result-section" id="result">
      <div class="placeholder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M9 2h6l3 3v17H6V2z"/><path d="M9 8h6M9 12h6M9 16h4"/></svg>
        <p>Enter your family code to view the statement</p>
      </div>
    </div>

    <footer>
      <p>For questions about your statement, contact the school administration.</p>
      <p id="updatedNote"></p>
    </footer>
  </main>

  <script>
    const resultDiv = document.getElementById('result');
    const codeInput = document.getElementById('codeInput');
    const checkBtn = document.getElementById('checkBtn');
    const updatedNote = document.getElementById('updatedNote');

    let studentData = null;

    const ICONS = {
      alert: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 8v5M12 16h.01"/></svg>',
      check: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M20 6 9 17l-5-5"/></svg>',
      copy: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="12" height="12" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/></svg>',
      share: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2 12 15"/><path d="m8 6 4-4 4 4"/><path d="M4 13v6a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-6"/></svg>'
    };

    async function loadData() {
      try {
        const res = await fetch('students.json', { cache: 'no-store' });
        if (!res.ok) throw new Error('Failed to load data');
        studentData = await res.json();
        return true;
      } catch (e) {
        console.error('Error loading data:', e);
        return false;
      }
    }

    function naira(n) {
      const v = Number(n) || 0;
      return '₦' + v.toLocaleString('en-NG', { maximumFractionDigits: 0 });
    }

    async function checkCode() {
      const code = codeInput.value.trim().toUpperCase();

      if (!code) {
        showError('Please enter your family code.');
        codeInput.focus();
        return;
      }

      resultDiv.innerHTML = `
        <div class="loading">
          <div class="spinner"></div>
          <p>Checking records…</p>
        </div>`;
      checkBtn.disabled = true;
      codeInput.disabled = true;

      try {
        if (!studentData) {
          const loaded = await loadData();
          if (!loaded) { showError('Unable to load fee data. Check your connection and try again.'); return; }
        }

        let student = studentData[code];
        if (!student) {
          const foundKey = Object.keys(studentData).find(k => k.toUpperCase() === code);
          if (foundKey) student = studentData[foundKey];
        }

        if (student) {
          displayStudent(student, code);
        } else {
          showError('That code doesn\'t match our records. Double-check it and try again, or contact the school office.');
        }
      } catch (e) {
        console.error(e);
        showError('Something went wrong. Please refresh and try again.');
      } finally {
        checkBtn.disabled = false;
        codeInput.disabled = false;
      }
    }

    function displayStudent(student, code) {
      const totalFee = Number(student.total_fee) || 0;
      const totalPaid = Number(student.total_paid) || 0;
      const balance = Number(student.balance) || 0;
      const pct = totalFee > 0 ? Math.max(0, Math.min(100, Math.round((totalPaid / totalFee) * 100))) : 0;
      const isClear = balance <= 0;

      const excludeKeys = ['LAST NAME', 'FIRST NAME', 'CLASS', 'TOTAL FEE', 'TOTAL PAID', 'BALANCE'];
      const feeKeys = Object.keys(student.details || {}).filter(k => !excludeKeys.includes(k.trim().toUpperCase()));

      let ledgerHtml = '';
      let hasValues = false;
      for (const key of feeKeys) {
        const raw = student.details[key];
        const numVal = parseFloat(raw);
        const label = key.replace(/_/g, ' ').trim().replace(/\s+/g, ' ');
        if (!isNaN(numVal) && numVal > 0) {
          ledgerHtml += `
            <div class="ledger-row">
              <span class="ledger-cat">${escapeHtml(toTitle(label))}</span>
              <span class="ledger-leader"></span>
              <span class="ledger-amt">${naira(numVal)}</span>
            </div>`;
          hasValues = true;
        } else if (isNaN(numVal) && raw && raw !== '0') {
          ledgerHtml += `
            <div class="ledger-row">
              <span class="ledger-cat">${escapeHtml(toTitle(label))}</span>
              <span class="ledger-leader"></span>
              <span class="ledger-amt">${escapeHtml(raw)}</span>
            </div>`;
          hasValues = true;
        }
      }

      const R = 32, C = 2 * Math.PI * R;
      const offset = C - (pct / 100) * C;

      const shareText = `Fee Statement — ${student.name} (${student.class})\nTotal: ${naira(totalFee)}\nPaid: ${naira(totalPaid)}\nBalance: ${naira(balance)}`;

      resultDiv.innerHTML = `
        <div class="statement">
          <div class="student-row">
            <div>
              <div class="student-name">${escapeHtml(student.name)}</div>
              <div class="student-code">Code · ${escapeHtml(code)}</div>
            </div>
            <span class="class-badge">${escapeHtml(student.class)}</span>
          </div>

          <div class="progress-block">
            <div class="ring-wrap">
              <svg viewBox="0 0 76 76" width="76" height="76">
                <circle class="ring-track" cx="38" cy="38" r="${R}"></circle>
                <circle class="ring-fill ${pct >= 100 ? 'paid-full' : ''}" cx="38" cy="38" r="${R}"
                  stroke-dasharray="${C}" stroke-dashoffset="${offset}"></circle>
              </svg>
              <div class="ring-pct">${pct}%</div>
            </div>
            <div class="totals">
              <div class="totals-row"><span class="t-label">Total fee</span><span class="t-val">${naira(totalFee)}</span></div>
              <div class="totals-row"><span class="t-label">Paid</span><span class="t-val">${naira(totalPaid)}</span></div>
              <div class="totals-row balance"><span class="t-label">Balance</span><span class="t-val ${isClear ? 'clear' : 'due'}">${naira(Math.abs(balance))}</span></div>
              <span class="status-pill ${isClear ? 'clear' : 'due'}">${isClear ? ICONS.check + ' Fully paid' : ICONS.alert + ' Balance due'}</span>
            </div>
          </div>

          ${hasValues ? `
            <div class="ledger-title">Breakdown</div>
            <div class="ledger">${ledgerHtml}</div>
          ` : '<div class="no-details">No itemised breakdown available for this term.</div>'}

          <div class="actions">
            <button class="action-btn" type="button" id="copyBtn">${ICONS.copy}<span>Copy</span></button>
            <button class="action-btn primary" type="button" id="shareBtn">${ICONS.share}<span>Share</span></button>
          </div>
        </div>`;

      document.getElementById('copyBtn').addEventListener('click', () => copyStatement(shareText));
      document.getElementById('shareBtn').addEventListener('click', () => shareStatement(shareText));
    }

    function copyStatement(text) {
      const btn = document.getElementById('copyBtn');
      navigator.clipboard.writeText(text).then(() => {
        const original = btn.innerHTML;
        btn.innerHTML = `${ICONS.check}<span>Copied</span>`;
        setTimeout(() => { btn.innerHTML = original; }, 1600);
      }).catch(() => {});
    }

    function shareStatement(text) {
      if (navigator.share) {
        navigator.share({ text }).catch(() => {});
      } else {
        window.open('https://wa.me/?text=' + encodeURIComponent(text), '_blank');
      }
    }

    function toTitle(s) {
      return s.toLowerCase().replace(/\b\w/g, c => c.toUpperCase());
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    function showError(message) {
      resultDiv.innerHTML = `
        <div class="error">
          ${ICONS.alert}
          <p>${escapeHtml(message)}</p>
        </div>`;
    }

    checkBtn.addEventListener('click', checkCode);
    codeInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') checkCode(); });

    loadData();
    setTimeout(() => codeInput.focus(), 300);
  </script>
</body>
</html>
