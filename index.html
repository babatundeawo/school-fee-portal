<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Fee Portal</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #333; }
        .container { max-width: 900px; margin: 40px auto; background: white; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); overflow: hidden; }
        header { background: #2c3e50; color: white; padding: 20px; text-align: center; }
        .form { padding: 30px; text-align: center; }
        input { padding: 15px; font-size: 18px; width: 280px; border: 2px solid #ddd; border-radius: 8px; }
        button { padding: 15px 30px; font-size: 18px; background: #27ae60; color: white; border: none; border-radius: 8px; cursor: pointer; margin-left: 10px; }
        button:hover { background: #219653; }
        #result { padding: 30px; min-height: 300px; }
        table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        th, td { padding: 12px; border: 1px solid #eee; text-align: left; }
        th { background: #34495e; color: white; }
        .highlight { background: #f8f9fa; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🌟 Private School Fee Portal</h1>
            <p>3rd Term 2025-2026 • Enter your Family Code</p>
        </header>
        <div class="form">
            <input type="text" id="codeInput" placeholder="e.g. ABAAB1000" onkeypress="if(event.key==='Enter') checkCode()">
            <button onclick="checkCode()">🔍 View Details</button>
        </div>
        <div id="result"></div>
    </div>

    <script>
        async function checkCode() {
            const code = document.getElementById('codeInput').value.trim().toUpperCase();
            const resultDiv = document.getElementById('result');
            if (!code) {
                resultDiv.innerHTML = '<p style="color:red;">Please enter your code.</p>';
                return;
            }
            try {
                const res = await fetch('students.json');
                const data = await res.json();
                if (data[code]) {
                    const s = data[code];
                    let html = `
                        <h2 style="color:#27ae60;">✅ ${s.name}</h2>
                        <p><strong>Class:</strong> ${s.class}</p>
                        <div style="display:flex; gap:20px; margin:20px 0;">
                            <div><strong>Total Fee:</strong> ₦${Number(s.total_fee).toLocaleString()}</div>
                            <div><strong>Paid:</strong> ₦${Number(s.total_paid).toLocaleString()}</div>
                            <div style="color:#e74c3c;"><strong>Balance:</strong> ₦${Number(s.balance).toLocaleString()}</div>
                        </div>
                        <h3>Detailed Fees</h3>
                        <table>
                            <tr><th>Item</th><th>Amount (₦)</th></tr>`;
                    Object.keys(s.details).forEach(key => {
                        const val = s.details[key];
                        if (!isNaN(parseFloat(val)) && parseFloat(val) > 0) {
                            html += `<tr><td>${key}</td><td>${parseFloat(val).toLocaleString()}</td></tr>`;
                        }
                    });
                    html += '</table>';
                    resultDiv.innerHTML = html;
                } else {
                    resultDiv.innerHTML = '<p style="color:red;">❌ Invalid code. Contact school admin.</p>';
                }
            } catch(e) {
                resultDiv.innerHTML = '<p style="color:red;">Error loading data.</p>';
            }
        }
    </script>
</body>
</html>
