<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Fee Portal | 3rd Term 2025-2026</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        
        body {
            font-family: 'Inter', Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            min-height: 100vh;
        }
        .container {
            max-width: 900px;
            margin: 40px auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            overflow: hidden;
        }
        header {
            background: #2c3e50;
            color: white;
            padding: 30px 20px;
            text-align: center;
        }
        header h1 {
            margin: 0;
            font-size: 2.2em;
        }
        .form-section {
            padding: 40px 30px;
            text-align: center;
            background: #f8f9fa;
        }
        input {
            padding: 18px 20px;
            font-size: 1.1em;
            width: 320px;
            border: 3px solid #ddd;
            border-radius: 12px;
            outline: none;
            transition: all 0.3s;
        }
        input:focus {
            border-color: #27ae60;
            box-shadow: 0 0 0 4px rgba(39, 174, 96, 0.2);
        }
        button {
            padding: 18px 32px;
            font-size: 1.1em;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            margin-left: 12px;
            font-weight: 600;
            transition: all 0.3s;
        }
        button:hover {
            background: #219653;
            transform: translateY(-2px);
        }
        #result {
            padding: 40px;
            min-height: 400px;
        }
        .success {
            background: #f0fdf4;
            border-left: 6px solid #27ae60;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 25px 0;
            background: white;
        }
        th, td {
            padding: 14px 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        th {
            background: #2c3e50;
            color: white;
            font-weight: 600;
        }
        .balance {
            color: #e74c3c;
            font-weight: bold;
            font-size: 1.3em;
        }
        .footer {
            text-align: center;
            padding: 20px;
            color: #666;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🌟 School Fee Portal</h1>
            <p>3rd Term 2025-2026 • Private & Secure</p>
        </header>

        <div class="form-section">
            <h2>Enter Your Family Code</h2>
            <input type="text" id="codeInput" placeholder="e.g. ABAABD1000" 
                   onkeypress="if(event.key === 'Enter') checkCode()">
            <button onclick="checkCode()">🔍 Check Details</button>
        </div>

        <div id="result"></div>

        <div class="footer">
            <p>For support, contact the school administration</p>
        </div>
    </div>

    <script>
        async function checkCode() {
            const code = document.getElementById('codeInput').value.trim().toUpperCase();
            const resultDiv = document.getElementById('result');
            
            if (!code) {
                resultDiv.innerHTML = `<p style="color:red; text-align:center;">⚠️ Please enter your family code.</p>`;
                return;
            }

            resultDiv.innerHTML = `<p style="text-align:center;">Loading...</p>`;

            try {
                const res = await fetch('students.json');
                const data = await res.json();

                if (data[code]) {
                    const s = data[code];
                    let html = `
                        <div class="success" style="padding:30px; border-radius:12px;">
                            <h2 style="color:#27ae60; margin-top:0;">✅ ${s.name}</h2>
                            <p><strong>Class:</strong> ${s.class}</p>
                            
                            <div style="display: flex; gap: 30px; margin: 25px 0; font-size: 1.2em;">
                                <div><strong>Total Fee:</strong> ₦${Number(s.total_fee).toLocaleString()}</div>
                                <div><strong>Paid:</strong> ₦${Number(s.total_paid).toLocaleString()}</div>
                                <div class="balance">Balance: ₦${Number(s.balance).toLocaleString()}</div>
                            </div>

                            <h3 style="margin-top:30px;">Fee Breakdown</h3>
                            <table>
                                <tr><th>Category</th><th>Amount (₦)</th></tr>`;
                    
                    Object.keys(s.details).forEach(key => {
                        const val = s.details[key];
                        if (!isNaN(parseFloat(val)) && parseFloat(val) > 0 && 
                            !['LAST NAME','FIRST NAME','CLASS'].includes(key)) {
                            html += `<tr><td>${key}</td><td>${parseFloat(val).toLocaleString()}</td></tr>`;
                        }
                    });
                    
                    html += `</table></div>`;
                    resultDiv.innerHTML = html;
                } else {
                    resultDiv.innerHTML = `<p style="color:red; text-align:center; font-size:1.2em;">❌ Invalid code.<br>Contact the school for assistance.</p>`;
                }
            } catch(e) {
                resultDiv.innerHTML = `<p style="color:red; text-align:center;">Error loading data. Please try again.</p>`;
            }
        }
    </script>
</body>
</html>
