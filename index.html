<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>School Fee Portal | 3rd Term 2025-2026</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, Arial, sans-serif;
            min-height: 100vh;
            min-height: 100dvh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        .container {
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.25);
            overflow: hidden;
            animation: slideUp 0.4s ease;
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        header {
            background: linear-gradient(135deg, #1a252f 0%, #2c3e50 100%);
            color: white;
            padding: 28px 20px 22px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        header::before {
            content: '';
            position: absolute;
            top: -60%;
            right: -30%;
            width: 250px;
            height: 250px;
            background: rgba(255,255,255,0.04);
            border-radius: 50%;
        }
        
        header::after {
            content: '';
            position: absolute;
            bottom: -40%;
            left: -20%;
            width: 180px;
            height: 180px;
            background: rgba(255,255,255,0.03);
            border-radius: 50%;
        }
        
        header h1 {
            font-size: 1.7em;
            font-weight: 800;
            letter-spacing: -0.5px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        header h1 .emoji {
            font-size: 1.1em;
        }
        
        header p {
            opacity: 0.75;
            margin-top: 6px;
            font-size: 0.9em;
            font-weight: 400;
            position: relative;
            letter-spacing: 0.3px;
        }
        
        .form-section {
            padding: 28px 18px 24px;
            text-align: center;
            background: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
        }
        
        .form-section h2 {
            font-size: 1.1em;
            color: #1a252f;
            margin-bottom: 16px;
            font-weight: 600;
        }
        
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-width: 100%;
            margin: 0 auto;
        }
        
        input {
            padding: 16px 18px;
            font-size: 1em;
            width: 100%;
            border: 2.5px solid #dee2e6;
            border-radius: 12px;
            outline: none;
            transition: all 0.25s ease;
            font-family: 'Inter', -apple-system, Arial, sans-serif;
            background: white;
            -webkit-appearance: none;
            appearance: none;
        }
        
        input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.15);
        }
        
        input::placeholder {
            color: #adb5bd;
            font-size: 0.95em;
        }
        
        input:disabled {
            opacity: 0.6;
            background: #f1f3f5;
        }
        
        button {
            padding: 16px 20px;
            font-size: 1em;
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.25s ease;
            font-family: 'Inter', -apple-system, Arial, sans-serif;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        
        button:active {
            transform: scale(0.97);
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        button .btn-icon {
            margin-right: 8px;
        }
        
        .help-text {
            margin-top: 14px;
            font-size: 0.8em;
            color: #868e96;
            line-height: 1.4;
        }
        
        .help-text a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }
        
        .help-text a:active {
            opacity: 0.7;
        }
        
        .result-section {
            padding: 20px 16px 24px;
            min-height: 200px;
        }
        
        .loading {
            text-align: center;
            padding: 40px 20px;
            color: #6c757d;
        }
        
        .spinner {
            display: inline-block;
            width: 36px;
            height: 36px;
            border: 3.5px solid #e9ecef;
            border-top: 3.5px solid #667eea;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin-bottom: 14px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .loading p {
            font-size: 0.95em;
        }
        
        .error {
            background: #fef2f2;
            border-left: 4px solid #ef4444;
            padding: 20px 18px;
            border-radius: 10px;
            color: #991b1b;
            text-align: center;
        }
        
        .error .icon {
            font-size: 2.5em;
            margin-bottom: 8px;
            display: block;
        }
        
        .error p {
            font-size: 0.95em;
            font-weight: 500;
            line-height: 1.5;
        }
        
        .success {
            background: #f0fdf4;
            border-left: 4px solid #22c55e;
            padding: 20px 16px 18px;
            border-radius: 10px;
        }
        
        .student-header {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 16px;
            padding-bottom: 14px;
            border-bottom: 2px solid #e5e7eb;
        }
        
        .student-header h2 {
            color: #166534;
            font-size: 1.15em;
            font-weight: 700;
            line-height: 1.3;
            word-break: break-word;
        }
        
        .student-header .code-info {
            color: #6b7280;
            font-size: 0.82em;
            font-weight: 500;
        }
        
        .student-header .class-badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 0.78em;
            font-weight: 600;
            display: inline-block;
            align-self: flex-start;
            letter-spacing: 0.3px;
        }
        
        .summary-cards {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            margin: 16px 0 20px;
        }
        
        .summary-card {
            background: white;
            padding: 14px 8px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            text-align: center;
            border: 1px solid #e5e7eb;
        }
        
        .summary-card .label {
            font-size: 0.6em;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }
        
        .summary-card .value {
            font-size: 1.1em;
            font-weight: 700;
            margin-top: 4px;
            word-break: break-word;
        }
        
        .summary-card .value.balance {
            color: #dc2626;
        }
        
        .summary-card .value.positive {
            color: #16a34a;
        }
        
        .fee-section-title {
            font-size: 1em;
            font-weight: 600;
            color: #1e293b;
            margin: 18px 0 10px;
        }
        
        .fee-table-wrapper {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            margin: 0 -4px;
            padding: 0 4px;
        }
        
        .fee-table {
            width: 100%;
            min-width: 280px;
            border-collapse: collapse;
            font-size: 0.88em;
            border-radius: 8px;
            overflow: hidden;
        }
        
        .fee-table th {
            background: #f1f5f9;
            color: #1e293b;
            font-weight: 600;
            padding: 10px 12px;
            text-align: left;
            border-bottom: 2px solid #e2e8f0;
            font-size: 0.82em;
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }
        
        .fee-table td {
            padding: 9px 12px;
            border-bottom: 1px solid #e2e8f0;
            font-size: 0.9em;
        }
        
        .fee-table tr:last-child td {
            border-bottom: none;
        }
        
        .fee-table tr:active td {
            background: #f1f3f5;
        }
        
        .fee-table .fee-amount {
            text-align: right;
            font-weight: 500;
            white-space: nowrap;
        }
        
        .fee-table .category-name {
            word-break: break-word;
            padding-right: 8px;
        }
        
        .no-details {
            color: #6b7280;
            text-align: center;
            padding: 20px 0;
            font-size: 0.9em;
        }
        
        .footer {
            text-align: center;
            padding: 16px 18px;
            color: #868e96;
            font-size: 0.75em;
            background: #f8f9fa;
            border-top: 1px solid #e9ecef;
            line-height: 1.5;
        }
        
        /* Touch-friendly tap targets */
        .clickable {
            cursor: pointer;
            touch-action: manipulation;
        }
        
        /* Improved scrolling */
        .scrollable {
            -webkit-overflow-scrolling: touch;
        }
        
        /* Small screen optimizations */
        @media (max-width: 380px) {
            body { padding: 8px; }
            header h1 { font-size: 1.4em; }
            .summary-cards { gap: 5px; }
            .summary-card .value { font-size: 0.95em; }
            .summary-card { padding: 10px 6px; }
            .fee-table { font-size: 0.8em; }
            .fee-table th, .fee-table td { padding: 7px 8px; }
        }
        
        @media (min-width: 600px) {
            body { padding: 30px; }
            .container { max-width: 600px; }
            .summary-cards { gap: 12px; }
            .summary-card .value { font-size: 1.3em; }
            .fee-table { font-size: 0.95em; }
        }
        
        @media (min-width: 768px) {
            .container { max-width: 700px; }
            .input-group { flex-direction: row; }
            input { flex: 1; }
            button { width: auto; min-width: 140px; }
            .summary-cards { gap: 15px; }
        }
        
        @media (max-width: 480px) {
            .student-header h2 { font-size: 1em; }
            .summary-card .label { font-size: 0.55em; }
            .summary-card .value { font-size: 1em; }
        }
        
        /* Dark mode support */
        @media (prefers-color-scheme: dark) {
            body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); }
            .container { background: #1e293b; }
            header { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
            .form-section { background: #1e293b; border-bottom-color: #334155; }
            .form-section h2 { color: #e2e8f0; }
            input { background: #0f172a; border-color: #334155; color: #e2e8f0; }
            input::placeholder { color: #64748b; }
            input:focus { border-color: #818cf8; box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2); }
            .success { background: #052e16; border-left-color: #22c55e; }
            .student-header { border-bottom-color: #334155; }
            .student-header h2 { color: #86efac; }
            .student-header .code-info { color: #94a3b8; }
            .summary-card { background: #0f172a; border-color: #334155; }
            .summary-card .label { color: #94a3b8; }
            .summary-card .value { color: #e2e8f0; }
            .summary-card .value.balance { color: #f87171; }
            .summary-card .value.positive { color: #4ade80; }
            .fee-section-title { color: #e2e8f0; }
            .fee-table th { background: #0f172a; color: #94a3b8; border-bottom-color: #334155; }
            .fee-table td { border-bottom-color: #1e293b; color: #e2e8f0; }
            .fee-table tr:active td { background: #1e293b; }
            .error { background: #450a0a; border-left-color: #ef4444; color: #fca5a5; }
            .footer { background: #1e293b; border-top-color: #334155; color: #64748b; }
            .help-text { color: #94a3b8; }
            .no-details { color: #94a3b8; }
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <header>
            <h1>
                <span class="emoji">🏫</span>
                Fee Portal
            </h1>
            <p>3rd Term 2025-2026</p>
        </header>

        <div class="form-section">
            <h2>🔑 Enter Family Code</h2>
            <div class="input-group">
                <input 
                    type="text" 
                    id="codeInput" 
                    placeholder="e.g. ABAAB1000" 
                    maxlength="20"
                    autofocus
                    inputmode="text"
                    autocorrect="off"
                    autocapitalize="characters"
                    spellcheck="false"
                    onkeypress="if(event.key === 'Enter') checkCode()"
                >
                <button id="checkBtn" onclick="checkCode()">
                    <span class="btn-icon">🔍</span> Check
                </button>
            </div>
            <div class="help-text">
                <small>Contact the school if you don't have a code</small>
            </div>
        </div>

        <div class="result-section" id="result">
            <div style="text-align:center; color:#94a3b8; padding:30px 10px;">
                <p style="font-size:1em;">👋 Enter your code to view fee details</p>
            </div>
        </div>

        <div class="footer">
            <p>For support, contact the school administration</p>
        </div>
    </div>

    <script>
        // Cache DOM elements
        const resultDiv = document.getElementById('result');
        const codeInput = document.getElementById('codeInput');
        const checkBtn = document.getElementById('checkBtn');

        // Student data cache
        let studentData = null;

        // Load data on page load
        async function loadData() {
            try {
                const res = await fetch('students.json');
                if (!res.ok) throw new Error('Failed to load data');
                studentData = await res.json();
                console.log('✅ Data loaded:', Object.keys(studentData).length, 'students');
                return true;
            } catch (e) {
                console.error('Error loading data:', e);
                return false;
            }
        }

        // Main check function
        async function checkCode() {
            const code = codeInput.value.trim().toUpperCase();
            
            if (!code) {
                showError('Please enter your family code.', '🔑');
                return;
            }

            // Show loading
            resultDiv.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Checking records...</p>
                </div>
            `;

            checkBtn.disabled = true;
            codeInput.disabled = true;

            try {
                if (!studentData) {
                    const loaded = await loadData();
                    if (!loaded) {
                        showError('Unable to load data. Please try again.', '⚠️');
                        return;
                    }
                }

                const student = studentData[code];
                
                if (student) {
                    displayStudent(student, code);
                } else {
                    const foundKey = Object.keys(studentData).find(
                        k => k.toUpperCase() === code
                    );
                    if (foundKey) {
                        displayStudent(studentData[foundKey], foundKey);
                    } else {
                        showError(
                            'Invalid family code. Please check and try again.',
                            '❓'
                        );
                    }
                }
            } catch (e) {
                console.error('Error:', e);
                showError('An error occurred. Please refresh and try again.', '⚠️');
            } finally {
                checkBtn.disabled = false;
                codeInput.disabled = false;
            }
        }

        function displayStudent(student, code) {
            const totalFee = student.total_fee || 0;
            const totalPaid = student.total_paid || 0;
            const balance = student.balance || 0;
            
            const excludeKeys = ['LAST NAME', 'FIRST NAME', 'CLASS'];
            const feeKeys = Object.keys(student.details).filter(k => !excludeKeys.includes(k));
            
            let detailsHtml = '';
            let hasValues = false;
            
            for (const key of feeKeys) {
                const val = student.details[key];
                if (val !== undefined && val !== null && val !== '' && val !== '0') {
                    const numVal = parseFloat(val);
                    if (!isNaN(numVal) && numVal > 0) {
                        detailsHtml += `
                            <tr>
                                <td class="category-name">${key.replace(/_/g, ' ')}</td>
                                <td class="fee-amount">₦${numVal.toLocaleString()}</td>
                            </tr>
                        `;
                        hasValues = true;
                    } else if (isNaN(numVal) && val !== '0') {
                        detailsHtml += `
                            <tr>
                                <td class="category-name">${key.replace(/_/g, ' ')}</td>
                                <td class="fee-amount">${val}</td>
                            </tr>
                        `;
                        hasValues = true;
                    }
                }
            }

            const balanceClass = balance > 0 ? 'balance' : (balance < 0 ? 'positive' : '');

            resultDiv.innerHTML = `
                <div class="success">
                    <div class="student-header">
                        <div>
                            <h2>✅ ${student.name}</h2>
                            <div class="code-info">Code: ${code}</div>
                        </div>
                        <span class="class-badge">${student.class}</span>
                    </div>
                    
                    <div class="summary-cards">
                        <div class="summary-card">
                            <div class="label">Total</div>
                            <div class="value">₦${totalFee.toLocaleString()}</div>
                        </div>
                        <div class="summary-card">
                            <div class="label">Paid</div>
                            <div class="value" style="color:#16a34a;">₦${totalPaid.toLocaleString()}</div>
                        </div>
                        <div class="summary-card">
                            <div class="label">Balance</div>
                            <div class="value ${balanceClass}">₦${balance.toLocaleString()}</div>
                        </div>
                    </div>
                    
                    ${hasValues ? `
                        <div class="fee-section-title">📋 Fee Breakdown</div>
                        <div class="fee-table-wrapper">
                            <table class="fee-table">
                                <thead>
                                    <tr>
                                        <th>Category</th>
                                        <th style="text-align:right;">Amount</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${detailsHtml}
                                </tbody>
                            </table>
                        </div>
                    ` : '<div class="no-details">No fee details available.</div>'}
                </div>
            `;
        }

        function showError(message, icon = '❌') {
            resultDiv.innerHTML = `
                <div class="error">
                    <span class="icon">${icon}</span>
                    <p>${message}</p>
                </div>
            `;
        }

        // Load data on page load
        loadData();

        // Focus input on load
        setTimeout(() => codeInput.focus(), 300);

        // Handle touch events for better mobile feel
        document.addEventListener('touchstart', function() {}, { passive: true });
    </script>
</body>
</html>
